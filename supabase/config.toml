# Configuración de Supabase para Mi Cartera (Fase 1)
# El project_id local es solo una etiqueta; el proyecto real se referencia por --project-ref en CI.
project_id = "mi-cartera"

# --- Edge Functions ---
# prices: la llama la app (usuario logueado) → exige JWT.
[functions.prices]
verify_jwt = true

# ingest: la llama MacroDroid (sin sesión) → sin JWT; se protege con INGEST_TOKEN propio.
[functions.ingest]
verify_jwt = false

# --- Open Banking (Enable Banking) ---
# bank-connect / bank-sync: las llama la app (usuario logueado) → exigen JWT.
[functions.bank-connect]
verify_jwt = true

[functions.bank-sync]
verify_jwt = true

# bank-disconnect: quita un banco enlazado del usuario (revoca en EB + borra la fila) → JWT.
[functions.bank-disconnect]
verify_jwt = true

# bank-aspsps: lista los bancos soportados para el selector → la llama la app (con JWT).
[functions.bank-aspsps]
verify_jwt = true

# bank-callback: aquí ATERRIZA el navegador desde el banco (sin sesión) → sin JWT.
# Se protege por el `state` aleatorio que casa con el enlace 'pending'.
[functions.bank-callback]
verify_jwt = false

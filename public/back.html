<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Mi Cartera</title>
<!-- Página PUENTE del retorno de Open Banking en la APK. bank-callback (Supabase) redirige
     aquí porque su gateway ya no permite servir HTML (fuerza Content-Type: text/plain +
     CSP sandbox y el navegador enseñaba el código fuente — visto 2026-07-10). Este puente
     vive en NUESTRO dominio de Pages y salta al deep-link micartera:// que reabre la app. -->
<style>
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0B1410;color:#E8F0EB;font-family:sans-serif;text-align:center;padding:24px;box-sizing:border-box}
  .ico{font-size:44px}
  .ttl{font-size:17px;font-weight:700}
  .msg{font-size:13px;color:#9fb3a8;max-width:340px;overflow-wrap:anywhere}
  .btn{background:#5FD08A;color:#06120C;padding:14px 26px;border-radius:14px;font-weight:800;text-decoration:none;font-size:15px}
</style>
</head>
<body>
<div class="ico" id="ico">✅</div>
<div class="ttl" id="ttl">Banco conectado</div>
<div class="msg" id="msg" hidden></div>
<a class="btn" id="btn" href="micartera://bank?ok=1">Volver a Mi Cartera</a>
<script>
(function(){
  var q=new URLSearchParams(location.search);
  var ok=q.get("ok")==="1";
  var msg=q.get("msg")||"";
  var target="micartera://bank"+(ok?"?ok=1":"?msg="+encodeURIComponent(msg||"error"));
  if(!ok){
    document.getElementById("ico").textContent="⚠️";
    document.getElementById("ttl").textContent="No se pudo conectar el banco";
    if(msg){ var m=document.getElementById("msg"); m.hidden=false; m.textContent=msg; }
  }
  document.getElementById("btn").setAttribute("href",target);
  setTimeout(function(){ location.href=target; },400);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0B1410" />
<meta name="color-scheme" content="light dark" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Mi Cartera</title>

<!-- Adelanta el TLS de la única conexión externa que queda (la nube) -->
<link rel="preconnect" href="https://sfyfjagbnhbplrljpbvh.supabase.co" crossorigin>
<!-- Fuentes AUTO-HOSPEDADAS (public/fonts/, variables, latin+latin-ext): sin CDN de Google,
     sin CSS bloqueante de terceros, y funcionan offline (las cachea el Service Worker). -->
<link rel="preload" href="fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>

<!-- Tema ANTES del primer pintado: evita el fogonazo oscuro del splash en temas claros -->
<script>try{var _s=JSON.parse(localStorage.getItem("micartera_v3"));var _th=_s&&_s.settings&&_s.settings.theme;if(_th)document.documentElement.setAttribute("data-theme",_th);}catch(e){}</script>

<!-- Supabase (sincronización en la nube) AUTO-HOSPEDADO y con versión fijada (v2.110.0, public/vendor/).
     Antes venía de cdn.jsdelivr.net con la etiqueta @2 flotante: una versión nueva con breaking change
     podía romper la app sin tocar nosotros nada. Si falla (offline), la app sigue con localStorage. -->
<script src="vendor/supabase.min.js"></script>

  @font-face{font-family:'Fraunces';font-style:normal;font-weight:100 900;font-display:swap;src:url(fonts/fraunces-latin-ext.woff2) format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;}
  :root{
    --bg:#0B1410; --bg-2:#0E1A14; --surface:#122319; --surface-2:#16291E;
    --line:#1f3a2c; --line-soft:#19301f;
    --mint:#5FD08A; --mint-bright:#7DE8A8; --mint-dim:#2f6b4a;
    --blue:#7FB5E8; --tan:#E6C36A; --cream:#F4EFE2;
    --text:#E8F0EA; --muted:#8FA89A; --muted-2:#5E7468; --coral:#E2705F; --coral-dim:#5c322c;
    --radius:20px;
    --shadow:0 18px 40px -24px rgba(0,0,0,.7);
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  /* ===== TEMAS DE COLOR (se aplican con html[data-theme=...]) ===== */
  /* Oscuro puro: negro neutro, mismo verde de acento */
  html[data-theme="dark"]{
    --bg:#0A0A0C; --bg-2:#141417; --surface:#17171B; --surface-2:#1F1F25;
    --line:#2B2B32; --line-soft:#232329;
    --text:#ECECEF; --muted:#9A9AA4; --muted-2:#66666F;
    --shadow:0 18px 40px -24px rgba(0,0,0,.85);
  }
  /* Claro / blanco */
  html[data-theme="light"]{
    --bg:#F3F6F3; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#EEF2EE;
    --line:#DCE4DD; --line-soft:#E7ECE7;
    --mint:#2FA866; --mint-bright:#36BE74; --mint-dim:#A6DCBC;
    --blue:#3E80C8; --tan:#C79A2E; --cream:#6E5F33;
    --text:#15201A; --muted:#566A5E; --muted-2:#8A988F; --coral:#D2563F; --coral-dim:#F1D2CB;
    --shadow:0 14px 30px -24px rgba(20,40,30,.30);
  }
  /* Azul (modo oscuro fresquito) */
  html[data-theme="blue"]{
    --bg:#0A1320; --bg-2:#0E1B2E; --surface:#13243B; --surface-2:#192E49;
    --line:#213D5C; --line-soft:#1A3049;
    --text:#E6EEF8; --muted:#93A8C2; --muted-2:#5E7A96;
    --shadow:0 18px 40px -24px rgba(0,0,0,.75);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  /* color-scheme: evita que el "modo oscuro automático" del navegador (Chrome Android)
     oscurezca a la fuerza el tema claro. Base = oscuro; el tema claro lo marca como light. */
  html{color-scheme:dark;}
  html[data-theme="light"]{color-scheme:light;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);overscroll-behavior:none;}
  /* fondo (degradados) por tema */
  html[data-theme="dark"] body{ background:var(--bg); }
  html[data-theme="light"] body{ background:
      radial-gradient(120% 55% at 80% -5%, rgba(47,168,102,.10), transparent 60%),
      radial-gradient(90% 50% at -10% 0%, rgba(62,128,200,.07), transparent 55%),
      var(--bg); }
  html[data-theme="blue"] body{ background:
      radial-gradient(120% 55% at 80% -5%, rgba(127,181,232,.16), transparent 60%),
      radial-gradient(90% 50% at -10% 0%, rgba(95,208,138,.05), transparent 55%),
      var(--bg); }
  /* en tema claro el hero es claro: el número grande va en texto oscuro, no en crema */
  html[data-theme="light"] .hero-amount{ color:var(--text); }
  body{
    font-family:'Manrope',system-ui,sans-serif;font-size:15px;line-height:1.45;overscroll-behavior-y:none;
    background:
      radial-gradient(120% 55% at 80% -5%, rgba(95,208,138,.12), transparent 60%),
      radial-gradient(90% 50% at -10% 0%, rgba(127,181,232,.06), transparent 55%),
      var(--bg);
    min-height:100vh;
  }
  #root{max-width:520px;margin:0 auto;min-height:100vh;position:relative;}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}
  .serif{font-family:'Fraunces',Georgia,serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select{font-family:inherit;}
  ::-webkit-scrollbar{width:0;height:0;}

  .app{height:100vh;height:100dvh;display:flex;flex-direction:column;padding-top:calc(var(--safe-top) + 8px);}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 14px;flex:0 0 auto;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand-mark{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--mint-bright),var(--mint-dim));
    box-shadow:0 6px 16px -6px rgba(95,208,138,.55), inset 0 1px 0 rgba(255,255,255,.3);}
  .brand-name{font-weight:700;letter-spacing:.2px;font-size:17px;}
  .brand-sub{font-size:11px;color:var(--muted-2);letter-spacing:.5px;text-transform:capitalize;font-weight:600;margin-top:1px;}
  .icon-btn{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--line-soft);color:var(--mint);}
  .icon-btn:active{background:var(--surface-2);}

  .tabbar-wrap{position:relative;flex:0 0 auto;padding:0 14px 10px;}
  .tabbar-wrap::after{content:"";position:absolute;top:0;right:15px;bottom:10px;width:34px;pointer-events:none;border-radius:0 16px 16px 0;background:linear-gradient(to right,transparent,var(--bg-2));}
  .tabbar{position:relative;display:flex;gap:4px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:16px;padding:5px;overflow-x:auto;scrollbar-width:none;scroll-behavior:smooth;}
  .tab{flex:0 0 auto;padding:9px 14px;border-radius:11px;font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:7px;transition:color .2s,transform .15s;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  .tab.active{color:#08120C;background:linear-gradient(160deg,var(--mint-bright),var(--mint));box-shadow:0 4px 12px -4px rgba(95,208,138,.5);}
  .tabbar.reordering{touch-action:none;}
  .tabbar.reordering .tab.active{transform:scale(1.08);box-shadow:0 8px 20px -6px rgba(95,208,138,.7);}
  .tab svg{width:15px;height:15px;}
  /* Tabs dinámicas: botón + (añadir), papelera (quitar) y hoja de añadir */
  .tab-add{flex:0 0 auto;width:34px;justify-content:center;padding:9px 0;font-size:17px;font-weight:800;color:var(--muted-2);border:1px dashed var(--line);border-radius:11px;background:transparent;}
  .tab-add:active{color:var(--mint);border-color:var(--mint-dim);}
  .tab-trash{position:fixed;left:50%;transform:translateX(-50%);top:calc(var(--safe-top) + 142px);z-index:45;
    display:flex;align-items:center;gap:8px;padding:13px 22px;border-radius:18px;font-size:13px;font-weight:700;
    color:var(--coral);background:rgba(226,112,95,.12);border:1.5px dashed rgba(226,112,95,.55);
    backdrop-filter:blur(8px);box-shadow:var(--shadow);transition:transform .15s,background .15s;pointer-events:none;}
  .tab-trash .tt-ic{font-size:17px;line-height:1;}
  .tab-trash.hot{transform:translateX(-50%) scale(1.1);background:rgba(226,112,95,.28);border-style:solid;color:#fff;}
  .tabsheet-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center;}
  .tabsheet{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--line);border-bottom:none;
    border-radius:22px 22px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));box-shadow:0 -18px 40px -20px rgba(0,0,0,.7);
    animation:sheetup .28s cubic-bezier(.22,.61,.36,1);}
  @keyframes sheetup{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .ts-title{font-weight:800;font-size:16px;}
  .ts-hint{font-size:12.5px;color:var(--muted-2);margin:4px 0 14px;}
  .ts-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;font-size:14.5px;font-weight:700;color:var(--text);
    padding:13px 14px;border-radius:13px;background:var(--bg-2);border:1px solid var(--line-soft);margin-bottom:8px;}
  .ts-item:active{border-color:var(--mint-dim);background:rgba(95,208,138,.10);}
  .ts-item svg{width:17px;height:17px;color:var(--mint);}
  /* Roles de cuenta (Patrimonio → Editar) */
  .rolechips{display:flex;gap:6px;padding:0 0 10px 50px;}
  .rchip{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:9px;background:var(--bg-2);border:1px solid var(--line-soft);color:var(--muted);}
  .rchip.on{color:#08120C;background:linear-gradient(160deg,var(--mint-bright),var(--mint));border-color:transparent;}
  /* Letra grande (accesibilidad) */
  html.bigtext #root{zoom:1.12;}
  /* Ayuda contextual "?" */
  .helpq{width:22px;height:22px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-size:12.5px;font-weight:800;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);}
  .helpq:active{color:var(--mint);border-color:var(--mint-dim);}
  .helpover{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:95;display:flex;align-items:center;justify-content:center;padding:24px;}
  .helpcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;max-width:340px;width:100%;box-shadow:var(--shadow);animation:sheetup .22s ease;color:var(--text);}
  /* Tour guiado (coach-marks) */
  .tour-wrap{position:fixed;inset:0;z-index:90;}
  .tour-spot{position:fixed;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.62), 0 0 0 3px var(--mint);transition:all .32s cubic-bezier(.22,.61,.36,1);pointer-events:none;}
  .tour-tip{position:fixed;left:16px;right:16px;max-width:480px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);z-index:91;animation:sheetup .25s ease;color:var(--text);}
  .tour-txt{font-size:15px;line-height:1.55;font-weight:600;}
  .tour-dots{display:flex;gap:5px;margin:12px 0;}
  .tour-dots .td{width:7px;height:7px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);transition:all .2s;}
  .tour-dots .td.on{background:var(--mint);border-color:transparent;width:18px;border-radius:5px;}
  .tour-btns{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .tour-skip{font-size:13px;font-weight:700;color:var(--muted-2);padding:8px;}

  .viewport{flex:1 1 auto;overflow:hidden;min-height:0;}
  .track{display:flex;height:100%;transition:transform .34s cubic-bezier(.22,.61,.36,1);will-change:transform;}
  .track.dragging{transition:none;}
  .page{flex:0 0 100%;min-width:100%;height:100%;overflow-y:auto;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;padding:6px 16px calc(96px + var(--safe-bottom));}
  @media (prefers-reduced-motion:reduce){.track{transition:none;}}

  .card{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line-soft);border-radius:var(--radius);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;user-select:none;}
  .card-title{display:flex;align-items:center;gap:11px;font-weight:700;font-size:15px;}
  .card-title .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .card-title .sub{font-size:12px;color:var(--muted-2);font-weight:500;margin-top:1px;}
  .chev{color:var(--muted-2);transition:transform .26s;flex:0 0 auto;}
  .chev.open{transform:rotate(180deg);}
  .card-body{padding:0 18px 18px;}
  .collapsible{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease;}
  .collapsible.open{grid-template-rows:1fr;}
  .collapsible > div{overflow:hidden;}

  .hero{position:relative;padding:22px 20px 16px;text-align:center;
    background:radial-gradient(140% 90% at 50% -20%, rgba(95,208,138,.16), transparent 60%),linear-gradient(180deg,var(--surface),var(--bg-2));
    border:1px solid var(--line);border-radius:24px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;}
  .hero-label{font-size:11.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .hero-amount{font-size:clamp(38px,11.5vw,54px);line-height:1;margin:10px 0 14px;font-weight:500;color:var(--cream);letter-spacing:-1px;}
  .hero-amount .cents{font-size:.52em;color:var(--muted);}
  .hero-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:6px 13px;border-radius:20px;}
  .pill.pos{background:rgba(95,208,138,.14);color:var(--mint);}
  .pill.neg{background:rgba(226,112,95,.14);color:var(--coral);}
  .pill.ghost{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--line-soft);}
  .spark{width:100%;height:70px;display:block;}

  .stack{display:flex;gap:3px;height:14px;border-radius:8px;overflow:hidden;background:var(--surface-2);}
  .stack > span{height:100%;border-radius:3px;transition:width .5s ease;}
  .stack-legend{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
  .sl-item{display:flex;align-items:center;gap:9px;font-size:13.5px;}
  .sl-item .sw{width:10px;height:10px;border-radius:4px;flex:0 0 auto;}
  .sl-item .nm{flex:1;color:var(--muted);}
  .sl-item .vl{font-weight:700;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .metric{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .metric .mlabel{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .metric.tall{display:flex;flex-direction:column;justify-content:center;}
  .metric-big{font-size:30px;font-weight:600;line-height:1.05;margin-top:10px;}
  .metric-sub{font-size:12px;color:var(--muted-2);margin-top:5px;}

  .ring-wrap{display:flex;flex-direction:column;align-items:center;}
  .ring{position:relative;width:124px;height:124px;margin:6px 0 2px;}
  .ring svg{transform:rotate(-90deg);}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-center .big{font-size:23px;font-weight:700;line-height:1;}
  .ring-center .small{font-size:11px;color:var(--muted-2);margin-top:3px;font-weight:600;}
  .ring-foot{display:flex;justify-content:space-between;width:100%;margin-top:10px;font-size:12px;}
  .ring-foot .muted{color:var(--muted-2);}

  .streak-flame{font-size:38px;line-height:1;filter:drop-shadow(0 4px 10px rgba(230,195,106,.35));}
  .streak-n{font-size:42px;font-weight:700;line-height:1;font-family:'Fraunces',serif;color:var(--mint);}
  .streak-row{display:flex;align-items:center;gap:14px;margin:10px 0 8px;}
  .pips{display:flex;gap:5px;flex-wrap:wrap;}
  .pip{width:13px;height:13px;border-radius:5px;background:var(--surface-2);border:1px solid var(--line);}
  .pip.on{background:linear-gradient(160deg,var(--mint-bright),var(--mint));border-color:transparent;}

  .culprit-row{display:flex;align-items:center;gap:16px;margin-top:8px;}
  .legend{flex:1;display:flex;flex-direction:column;gap:7px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;}
  .legend-item .sw{width:9px;height:9px;border-radius:3px;flex:0 0 auto;}
  .legend-item .nm{flex:1;color:var(--muted);}
  .legend-item .vl{font-weight:700;}

  .filters{margin-bottom:14px;}
  .searchbar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:9px 12px;margin-bottom:9px;}
  .searchbar-ic{font-size:13px;opacity:.7;}
  .searchbar-in{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit;}
  .searchbar-in::-webkit-search-cancel-button{display:none;}
  .searchbar-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;}
  .sub-row{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line-soft);}
  .sub-row:last-child{border-bottom:none;}
  .sub-row.off{opacity:.55;}
  .sub-ic{width:34px;height:34px;flex:0 0 34px;border-radius:10px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .sub-mid{flex:1;min-width:0;}
  .sub-name{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sub-tag{font-size:11px;font-weight:600;color:var(--muted);}
  .sub-meta{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .sub-amt{font-weight:800;font-size:13.5px;}
  .trend-row{display:flex;align-items:center;gap:11px;padding:7px 0;border-bottom:1px solid var(--line-soft);}
  .trend-row:last-of-type{border-bottom:none;}
  .trend-ic{font-size:16px;width:22px;text-align:center;}
  .trend-mid{flex:1;min-width:0;}
  .trend-nm{font-weight:700;font-size:13.5px;}
  .trend-sub{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .trend-pct{font-weight:800;font-size:12.5px;white-space:nowrap;}
  .trend-pct.up{color:#E2705F;} .trend-pct.down{color:var(--mint);}
  .chips{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .chip{flex:0 0 auto;padding:8px 13px;border-radius:11px;font-size:12.5px;font-weight:600;background:var(--surface);border:1px solid var(--line-soft);color:var(--muted);}
  .chip.active{background:rgba(95,208,138,.14);border-color:var(--mint-dim);color:var(--mint);}
  .range{display:flex;gap:8px;margin-top:10px;align-items:center;}
  .range input{flex:1;background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text);border-radius:11px;padding:9px 11px;font-size:13px;}
  .range span{color:var(--muted-2);font-size:12px;}
  .cat-select{margin-top:10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}

  .total-bar{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(160deg,rgba(95,208,138,.10),var(--bg-2));border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin-bottom:12px;}
  .total-bar .tl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .total-bar .tn{font-size:26px;font-weight:700;font-family:'Fraunces',serif;}
  .total-bar .cnt{font-size:12px;color:var(--muted-2);text-align:right;}

  .action-row{display:flex;gap:10px;}
  .add-form{background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;padding:14px;margin-top:12px;display:flex;flex-direction:column;gap:10px;}
  .af-in{background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text);border-radius:11px;padding:11px 13px;font-size:14px;width:100%;}
  .af-row{display:flex;gap:10px;}
  .af-row .af-in{flex:1;min-width:0;}
  .month-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
  .mchip{font-size:12px;font-weight:700;padding:7px 0;border-radius:9px;background:var(--bg-2);border:1px solid var(--line-soft);color:var(--muted-2);text-align:center;}
  .mchip.on{color:#08120C;background:linear-gradient(160deg,var(--mint-bright),var(--mint));border-color:transparent;}
  .paid-row{opacity:.5;}
  .paid-row .rval{text-decoration:line-through;}

  .edit-extra{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .liqbox{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:13px;padding:11px 13px;margin-bottom:10px;}
  .liqbox.danger{border-color:rgba(226,112,95,.5);background:rgba(226,112,95,.07);}

  .af-result.yes{border-color:rgba(95,208,138,.45);background:rgba(95,208,138,.08);}
  .af-result.tight,.af-result.floor{border-color:rgba(242,193,78,.5);background:rgba(242,193,78,.08);}
  .af-result.no{border-color:rgba(226,112,95,.5);background:rgba(226,112,95,.08);}

  .af-info{margin-top:10px;padding:10px 12px;border-radius:11px;background:var(--bg-2);border:1px solid var(--line-soft);}
  .af-safe{font-weight:700;font-size:13px;color:var(--mint);}
  .recap-card{background:linear-gradient(135deg,rgba(95,208,138,.14),rgba(127,181,232,.10));border:1px solid rgba(95,208,138,.4);border-radius:16px;padding:15px 16px;margin-bottom:12px;}
  .recap-h{font-weight:800;font-size:15px;margin-bottom:10px;}
  .recap-stats{display:flex;gap:10px;}
  .recap-stat{flex:1;text-align:center;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:11px;padding:9px 6px;}
  .recap-v{font-weight:800;font-size:16px;}
  .recap-v.good{color:var(--mint);} .recap-v.bad{color:#E2705F;}
  .recap-l{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .af-verdict{font-weight:800;font-size:14px;}
  .af-low{font-size:12.5px;color:var(--text);margin-top:5px;}
  .af-delta{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .liqrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:2px 0;}
  .liqrow.strong{font-weight:800;font-size:15px;border-top:1px solid var(--line-soft);margin-top:5px;padding-top:7px;}
  .alarmbox{background:rgba(226,112,95,.12);border:1px solid rgba(226,112,95,.45);color:var(--coral);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.45;}

  .ex-row{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--line-soft);}

  .ex-ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:19px;flex:0 0 auto;background:var(--surface-2);border:1px solid var(--line-soft);}
  .ex-mid{flex:1;min-width:0;}
  .ex-merchant{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ex-meta{font-size:12px;color:var(--muted-2);margin-top:2px;display:flex;gap:7px;align-items:center;}
  .ex-cat{padding:1px 7px;border-radius:6px;background:var(--surface-2);font-size:10.5px;font-weight:600;}
  .ex-amt{font-weight:700;font-size:15px;flex:0 0 auto;color:var(--text);}
  .day-sep{font-size:11px;color:var(--muted-2);font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:14px 4px 4px;}
  .sentinel{height:30px;display:grid;place-items:center;color:var(--muted-2);font-size:12px;}
  .empty{text-align:center;padding:34px 20px;color:var(--muted);}

  .mono{border-radius:11px;display:grid;place-items:center;font-size:12.5px;font-weight:800;flex:0 0 auto;border:1px solid;letter-spacing:.3px;}
  .row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line-soft);}
  .row:last-child{border-bottom:none;}
  .row .rl{display:flex;align-items:center;gap:12px;min-width:0;}
  .row .ric{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex:0 0 auto;background:var(--surface-2);border:1px solid var(--line-soft);}

  .row .rval .rvsub{font-size:11px;color:var(--mint);font-weight:600;margin-top:1px;}
  .row .rval .rvsub.neg{color:var(--coral);}
  .row input.editv{width:108px;text-align:right;background:var(--bg-2);border:1px solid var(--mint-dim);color:var(--text);border-radius:9px;padding:7px 9px;font-size:14px;font-weight:600;}
  .editpair{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
  .editpair label{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted-2);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .editpair input{width:96px;text-align:right;background:var(--bg-2);border:1px solid var(--mint-dim);color:var(--text);border-radius:8px;padding:6px 8px;font-size:13px;font-weight:600;}
  .del-btn{width:26px;height:26px;border-radius:8px;background:rgba(226,112,95,.14);color:var(--coral);font-size:12px;font-weight:700;flex:0 0 auto;display:grid;place-items:center;}
  .costtoggle{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);font-weight:600;background:var(--surface);border:1px solid var(--line-soft);border-radius:13px;padding:11px 14px;margin-bottom:12px;cursor:pointer;}
  .costtoggle .cbx{width:20px;height:20px;border-radius:6px;border:1px solid var(--mint-dim);background:var(--bg-2);color:#08120C;display:grid;place-items:center;font-size:13px;font-weight:800;flex:0 0 auto;}
  .costtoggle .cbx.on{background:linear-gradient(160deg,var(--mint-bright),var(--mint));border-color:transparent;}

  .subtotal{display:flex;justify-content:space-between;padding:14px 0 2px;margin-top:4px;border-top:1px dashed var(--line);font-weight:700;}
  .subtotal .muted{color:var(--muted);font-weight:600;}

  .bar{height:9px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:8px;border:1px solid var(--line-soft);}
  .bar > i{display:block;height:100%;border-radius:6px;}
  .rendbar{height:6px;border-radius:5px;background:var(--surface-2);overflow:hidden;}
  .rendbar > i{display:block;height:100%;border-radius:5px;}
  /* Ajustes rediseñados (Claude Design): tarjetas con filas agrupadas + switches */
  .set-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;margin-top:14px;overflow:hidden;}
  .set-card .sc-title{font-weight:800;font-size:13px;color:var(--muted);padding:13px 16px 2px;letter-spacing:.2px;}
  .set-row{display:flex;align-items:center;gap:11px;padding:13px 16px;border:none;border-top:1px solid var(--line);width:100%;background:none;color:var(--text);font-size:14.5px;font-family:inherit;text-align:left;cursor:pointer;box-sizing:border-box;}
  .set-card>.set-row:first-child{border-top:none;}
  .set-row .sr-ic{font-size:17px;flex:0 0 22px;text-align:center;line-height:1;}
  .set-row .sr-lb{flex:1;font-weight:700;min-width:0;}
  .set-row .sr-val{color:var(--muted);font-size:13.5px;font-weight:600;flex:0 1 auto;text-align:right;}
  .set-row .sr-chev{color:var(--muted-2);font-size:17px;line-height:1;transition:transform .2s;flex:0 0 auto;}
  .set-row .sr-chev.open{transform:rotate(90deg);}
  .set-exp{padding:4px 14px 14px;border-top:1px dashed var(--line);}
  /* .swx (no ".sw": ese nombre ya es el swatch de las leyendas de gráficos) */
  .swx{position:relative;width:44px;height:26px;border-radius:13px;background:var(--surface-2);border:1px solid var(--line);transition:background .2s,border-color .2s;flex:0 0 auto;display:inline-block;}
  .swx.on{background:var(--mint);border-color:var(--mint);}
  .swx::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .swx.on::after{left:20px;}
  .wedit{border:1px dashed var(--line);border-radius:16px;padding:8px;margin-bottom:12px;background:var(--bg-2);}
  .wedit.off{opacity:.5;}
  .wedit-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;padding:0 2px;}
  .wedit-lbl{font-size:12.5px;font-weight:700;color:var(--muted);}
  .wedit-btns{display:flex;gap:6px;align-items:center;}
  .wedit-btns button{font-size:12px;font-weight:700;padding:5px 9px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line-soft);color:var(--text);}
  .wedit-btns button:disabled{opacity:.35;}
  .wedit-btns button.on{color:#08120C;background:linear-gradient(160deg,var(--mint-bright),var(--mint));border-color:transparent;}
  .wedit-lock{font-size:11px;color:var(--muted-2);font-weight:700;padding:0 4px;}
  .wedit-body{pointer-events:none;}
  .pencil-btn{font-size:11px;color:var(--muted-2);background:var(--surface-2);border:1px solid var(--line-soft);border-radius:7px;padding:1px 6px;line-height:1.4;}
  .ex-del{font-size:12px;color:var(--muted-2);background:transparent;border:none;padding:4px 6px;opacity:.55;}
  .ex-del:hover{opacity:1;color:var(--coral);}
  .wdragwrap{transition:transform .18s cubic-bezier(.22,.61,.36,1);-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  .wdragwrap.lifting{box-shadow:0 22px 48px -14px rgba(0,0,0,.55);border-radius:20px;}
  .debt-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted-2);margin-top:7px;}

  /* Metas de ahorro (#15) */
  .goal-top{display:flex;align-items:center;gap:12px;}
  .goal-emoji{font-size:28px;line-height:1;flex:0 0 auto;}
  .goal-name{font-weight:700;font-size:15px;color:var(--text);overflow:hidden;text-overflow:ellipsis;}
  .goal-amt{font-size:12.5px;color:var(--muted-2);margin-top:2px;}
  .goal-pct{font-weight:800;font-size:16px;color:var(--mint);flex:0 0 auto;}
  .goal-eta{font-size:12.5px;color:var(--muted);margin-top:9px;line-height:1.45;}
  .goal-eta.ok{color:var(--mint);} .goal-eta.warn{color:#E2A23F;}
  .goal-medal{font-size:11.5px;font-weight:700;color:#F2C14E;}
  .goal-dl-lbl{font-size:11.5px;color:var(--muted-2);font-weight:600;margin:2px 2px -4px;}
  .emoji-pick{display:flex;flex-wrap:wrap;gap:6px;}
  .emoji-pick button{font-size:18px;line-height:1;padding:6px 8px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line-soft);cursor:pointer;}
  .emoji-pick button.on{border-color:var(--mint);background:rgba(95,208,138,.16);}
  .confetti{position:fixed;top:-14px;width:9px;height:14px;border-radius:2px;z-index:200;pointer-events:none;animation:conffall linear forwards;}
  @keyframes conffall{to{transform:translateY(106vh) rotate(720deg);}}
  /* Gamificación: nivel, retos, logros */
  .gm-level{background:linear-gradient(135deg,rgba(201,166,240,.12),rgba(127,181,232,.10))!important;border-color:rgba(201,166,240,.35)!important;}
  .gm-lvl-top{display:flex;align-items:center;gap:12px;}
  .gm-lvl-ic{font-size:30px;line-height:1;}
  .gm-lvl-name{font-weight:800;font-size:15px;}
  .gm-lvl-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .gm-lvl-badge{font-size:10.5px;font-weight:700;color:#C9A6F0;text-transform:uppercase;letter-spacing:.04em;}
  .gm-lvl-next{font-size:12px;color:var(--muted);margin-top:7px;text-align:right;}
  .gm-sec-h{font-weight:800;font-size:14px;margin-bottom:12px;}
  .gm-reto-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .gm-reto-name{font-weight:700;font-size:13.5px;}
  .gm-reto-pct{font-size:12.5px;color:var(--muted);font-weight:700;}
  .gm-reto-pct.over{color:#E2705F;}
  .gm-reto-sub{font-size:12px;margin-top:6px;}
  .gm-reto-sub.ok{color:var(--mint);} .gm-reto-sub.warn{color:#E2705F;}
  .gm-streak{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px;}
  .gm-streak.on{color:#F2914E;}
  .gm-streak-best{color:var(--muted);font-weight:500;}
  .gm-badges{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .gm-badge{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:11px;background:var(--bg-2);border:1px solid var(--line-soft);opacity:.5;}
  .gm-badge.on{opacity:1;background:rgba(242,193,78,.12);border-color:rgba(242,193,78,.45);}
  .gm-badge-ic{font-size:16px;line-height:1;}
  .gm-badge-lbl{font-size:11.5px;font-weight:600;line-height:1.2;}
  /* Compartido */
  .sh-card{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
  .sh-emoji{font-size:26px;line-height:1;}
  .sh-name{font-weight:800;font-size:15px;}
  .sh-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .sh-arrow{color:var(--muted);font-size:22px;font-weight:700;}
  .sh-back{background:none;border:none;color:var(--blue);font-weight:700;font-size:13.5px;cursor:pointer;padding:4px 0 10px;}
  .sh-settle{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;}
  .sh-settle:last-child{border-bottom:none;}
  .sh-owe{font-weight:800;color:#E2A05F;}
  .sh-people{display:flex;flex-wrap:wrap;gap:7px;}
  .sh-chip{font-size:12px;font-weight:600;padding:6px 10px;border-radius:20px;background:var(--bg-2);border:1px solid var(--line-soft);}
  .sh-exp{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);}
  .sh-exp:last-of-type{border-bottom:none;}
  .sh-exp-desc{font-weight:700;font-size:13.5px;}
  .sh-exp-meta{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .sh-parts{display:flex;flex-wrap:wrap;gap:6px;}
  .sh-part{font-size:12px;font-weight:600;padding:6px 11px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line-soft);color:var(--muted);cursor:pointer;}
  .sh-part.on{border-color:var(--mint);background:rgba(95,208,138,.16);color:var(--mint);}
  .catpick{display:flex;flex-wrap:wrap;gap:6px;padding:2px 2px 12px 50px;}
  .catpick-b{font-size:12px;font-weight:600;padding:6px 9px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text);cursor:pointer;}
  .catpick-b.on{border-color:var(--mint);background:rgba(95,208,138,.16);color:var(--mint);}
  .cardflag{display:block;width:100%;font-size:12.5px;font-weight:600;padding:9px 11px;border-radius:11px;background:rgba(95,208,138,.14);border:1px solid var(--mint);color:var(--mint);cursor:pointer;text-align:center;}
  .cardflag.off{background:var(--bg-2);border-color:var(--line-soft);color:var(--muted);}
  .catpick + .cardflag{margin-left:50px;width:calc(100% - 50px);}
  .ru-edit{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px solid var(--line-soft);}
  .ru-edit:first-of-type{border-top:none;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:13px;font-weight:700;font-size:14px;}
  .btn-primary{background:linear-gradient(160deg,var(--mint-bright),var(--mint));color:#08120C;box-shadow:0 8px 18px -8px rgba(95,208,138,.55);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-ghost{background:var(--surface);border:1px solid var(--line-soft);color:var(--muted);}
  .btn-block{display:flex;width:100%;}
  .btn[disabled]{opacity:.55;pointer-events:none;}
  .btn .spin{width:15px;height:15px;border:2px solid rgba(8,18,12,.3);border-top-color:#08120C;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}

  .edit-link{font-size:12.5px;font-weight:700;color:var(--mint);padding:5px 9px;border-radius:9px;background:rgba(95,208,138,.10);}
  .edit-link.save{color:#08120C;background:linear-gradient(160deg,var(--mint-bright),var(--mint));}

  .hint{font-size:12px;color:var(--muted-2);margin-top:10px;line-height:1.5;}
  .sync-note{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted-2);margin-top:10px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);flex:0 0 auto;}
  .sync-dot.err{background:var(--coral);}
  .sync-dot.idle{background:var(--muted-2);}

  .culpa{display:flex;align-items:center;gap:7px;justify-content:center;text-align:center;flex-wrap:wrap;
    background:linear-gradient(160deg,rgba(95,208,138,.12),var(--bg-2));border:1px solid var(--line);
    border-radius:16px;padding:14px 16px;margin-bottom:14px;font-size:14px;font-weight:600;color:var(--text);}
  .culpa.over{background:linear-gradient(160deg,rgba(226,112,95,.12),var(--bg-2));}
  .culpa .big{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:var(--mint);}
  .culpa.over .big{color:var(--coral);}

  .dots{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(22px + var(--safe-bottom));display:flex;gap:7px;z-index:30;background:color-mix(in srgb, var(--bg-2) 78%, transparent);backdrop-filter:blur(8px);padding:9px 14px;border-radius:20px;border:1px solid var(--line-soft);opacity:0;pointer-events:none;transition:opacity .3s ease;}
  .dots.show{opacity:1;pointer-events:auto;}
  .dots .d{width:7px;height:7px;border-radius:50%;background:var(--muted-2);transition:all .25s;}
  .dots .d.on{width:22px;background:linear-gradient(90deg,var(--mint-bright),var(--mint));}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(74px + var(--safe-bottom));background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:11px 18px;border-radius:14px;font-size:13px;font-weight:600;z-index:200;box-shadow:var(--shadow);animation:toastin .3s ease;}
  .offline-pill{position:fixed;left:50%;transform:translateX(-50%);top:calc(var(--safe-top) + 8px);background:rgba(226,160,95,.16);border:1px solid rgba(226,160,95,.5);color:#E2A05F;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;z-index:210;white-space:nowrap;box-shadow:var(--shadow);}
  .update-pill{position:fixed;left:50%;transform:translateX(-50%);top:calc(var(--safe-top) + 8px);background:linear-gradient(160deg,var(--mint-bright),var(--mint));color:#08120C;padding:9px 18px;border-radius:20px;font-size:12.5px;font-weight:800;z-index:215;white-space:nowrap;box-shadow:0 8px 22px -8px rgba(95,208,138,.7);border:none;cursor:pointer;animation:updin .35s ease;}
  .update-pill:active{transform:translateX(-50%) translateY(1px);}
  @keyframes updin{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}
  /* Cajón de Ajustes: página oculta a la IZQUIERDA del Resumen (estilo Revolut) */
  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:55;}
  .drawer-backdrop.open{opacity:1;pointer-events:auto;}
  .drawer-panel{position:fixed;top:0;left:0;height:100%;width:86%;max-width:360px;transform:translateX(-100%);transition:transform .26s cubic-bezier(.22,.61,.36,1);z-index:56;background:var(--surface);border-right:1px solid var(--line);padding:calc(var(--safe-top) + 20px) 22px 22px;overflow-y:auto;color:var(--text);font-family:'Manrope',sans-serif;}

    async pullState(){

    },
    async pushState(uid, data){
      if(!sb || !uid) return;

        { user_id:uid, data:data, updated_at:new Date().toISOString() },

    async pullExpenses(){

      const {error}=await sb.from('expenses').upsert(

    // Trae saldo (+ movimientos, que en Capa 2 ignoramos) de los bancos enlazados.
    async bankSync(){

      return data;   // { ok, dryRun, links:[{aspsp, iban, balances, transactions}] }
    },
    // Quita un banco enlazado (revoca en Enable Banking + borra la fila). Reversible: reconectar.
    async bankDisconnect(aspsp_name){

    // --- Telemetría solo-admin (0006_app_events): errores y pings de quien usa la app.
    // best-effort SIEMPRE (nunca rompe nada); máx 20 por sesión y dedupe del mismo mensaje.
    async logEvent(kind, message, detail){
      try{
        if(!sb) return;
        this._evSent=this._evSent||{}; this._evN=this._evN||0;
        const key=kind+"|"+String(message).slice(0,120);
        if(this._evSent[key] || this._evN>=20) return;
        this._evSent[key]=1; this._evN++;
        const {data:{session}}=await sb.auth.getSession();
        if(!session) return;
        await sb.from('app_events').insert({
          user_id:session.user.id,
          email:session.user.email||null,
          kind:kind||'error',

          app_version:CONFIG.APP_VERSION,
          platform:(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform())?'android':'web'
        });
      }catch(e){}
    },
    // Panel del admin: últimos eventos de TODOS los usuarios (RLS deja leer solo al admin).
    async adminEvents(limit){
      if(!sb) return [];
      const {data,error}=await sb.from('app_events')
        .select('email,kind,message,detail,app_version,platform,created_at')
        .order('created_at',{ascending:false}).limit(limit||60);

/* Convierte una fila de la tabla `expenses` al formato interno de la app. */
function expenseFromRow(r){
  return {
    id: r.id,
    date: new Date(r.fecha).toISOString(),
    merchant: r.comercio || "Gasto",
    amount: Number(r.importe) || 0,
    // misma autodetección que el path del Sheet: si la cat es genérica, la deduce por comercio
    category: resolveCategory(r.cat, r.comercio || ""),
    source: "supabase",
    noCard: r.no_card ? true : undefined,   // bizum/transfer: fuera del round-up (columna 0005)
  };
}

/* Une gastos en la lista local con dedup por clave (fecha|importe|comercio).
   ADITIVO: nunca borra los que ya tenías; solo añade los nuevos. Esto evita perder
   datos durante la migración (la tabla de la nube puede estar aún vacía). */
function mergeExpenses(prevList, incoming){
  const keyOf=function(e){ return String(e.date).slice(0,10)+"|"+e.amount+"|"+(e.merchant||""); };
  const seen={}; const list=[];
  (prevList||[]).forEach(function(e){ const k=keyOf(e); if(!seen[k]){ seen[k]=1; list.push(e); } });
  let nuevos=0;
  (incoming||[]).forEach(function(e){ const k=keyOf(e); if(!seen[k]){ seen[k]=1; list.push(e); nuevos++; } });
  return { list:list, nuevos:nuevos };
}

/* ¿El estado bajado de la nube tiene forma válida? Evita machacar lo local con algo corrupto/parcial.
   (Los arrays pueden estar vacíos —usuario nuevo— pero deben EXISTIR y ser arrays.) */
function validCloudState(s){
  if(!s || typeof s!=="object") return false;
  return ["accounts","investments","debts","fixed"].every(function(k){ return Array.isArray(s[k]); });
}

/* Para el push FRECUENTE a la nube (cada ~1,2s): los gastos viven en su tabla `expenses`
   (fuente de verdad), así que NO los duplicamos en el JSONB de app_state → se mantiene ligero
   aunque haya miles de gastos. El backup diario sí guarda el estado completo. */
function slimForCloud(s){ const c=Object.assign({},s); delete c.expenses; delete c.bankTx; return c; }

/* ---------- Desbloqueo biométrico (huella / Face ID vía WebAuthn) ----------
   Candado LOCAL por dispositivo: tras iniciar sesión una vez, la app pide huella al abrir.
   No verifica en servidor (suficiente para uso personal); es una capa de UX tipo app de banco. */
function bufToB64(buf){ const b=new Uint8Array(buf); let s=""; for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
function b64ToBuf(b64){ const s=atob(b64); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a.buffer; }
/* Plugin nativo de la app Android (biometría, widget, notificaciones). null en web pura. */
function natPlugin(){
  try{ return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.MiCartera) || null; }catch(e){ return null; }
}
const bio = {
  // En la app Android la WebView NO expone WebAuthn → usa el plugin nativo (BiometricPrompt).
  supported(){ if(natPlugin()) return true; return !!(window.PublicKeyCredential && navigator.credentials && location.protocol==="https:"); },
  enabled(){ return !!store.get("bio_cred"); },
  async enable(uid, email){
    const nat=natPlugin();
    if(nat){
      const r=await nat.bioAvailable();
      if(!r || !r.available) throw new Error("Configura primero la huella o el bloqueo de pantalla del móvil");
      await nat.bioVerify();                       // pide la huella YA, como el create() de WebAuthn
      store.set("bio_cred", { native:true });
      return true;
    }
    if(!this.supported()) throw new Error("Este dispositivo/navegador no soporta huella");
    const cred = await navigator.credentials.create({ publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp:{ id: location.hostname, name:"Mi Cartera" },
      user:{ id: new TextEncoder().encode(String(uid||email||"user")), name: email||"usuario", displayName: email||"Mi Cartera" },
      pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
      authenticatorSelection:{ authenticatorAttachment:"platform", userVerification:"required", residentKey:"preferred" },
      timeout:60000,
    }});
    store.set("bio_cred", { id: bufToB64(cred.rawId) });
    return true;
  },
  disable(){ try{ localStorage.removeItem("bio_cred"); }catch(e){} store.set("bio_cred", null); },
  async unlock(){
    const c = store.get("bio_cred"); if(!c) return true;
    if(c.native){
      const nat=natPlugin();
      if(!nat) return true;   // candado nativo pero sin plugin (no debería pasar): no dejar la app inaccesible
      await nat.bioVerify();
      return true;
    }
    await navigator.credentials.get({ publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rpId: location.hostname,
      allowCredentials:[{ type:"public-key", id: b64ToBuf(c.id) }],
      userVerification:"required",
      timeout:60000,
    }});

const MONTHS=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
function parseDate(v){
  if(v instanceof Date) return v;
  if(typeof v==="number") return new Date(v);
  const s=String(v||"").trim();
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){ let y=+m[3]; if(y<100)y+=2000; return new Date(y,(+m[2])-1,+m[1]); }
  const d=new Date(s); return isNaN(d)?new Date():d;
}
const dayKey=(d)=> d.toISOString().slice(0,10);
function relDay(d){
  const tn=new Date(); const y=new Date(); y.setDate(tn.getDate()-1);
  if(dayKey(d)===dayKey(tn)) return t("g_today");
  if(dayKey(d)===dayKey(y)) return t("g_yesterday");
  return d.getDate()+" "+monthShort(d.getMonth());
}
const startOfMonth=(d)=>{ d=d||new Date(); return new Date(d.getFullYear(),d.getMonth(),1); };

/* ---------- Lógica del efectivo de Trade Republic ----------
   El "value" de la cuenta de gasto = saldo al INICIO del mes en curso
   (después de inyecciones de meses anteriores, antes del gasto de este mes).
   Saldo mostrado = value + inyección(si ya pasó el último día laborable) − gasto del mes.
   La nómina entra el último día LABORABLE del mes (sin falta). */
const mk=(y,m)=> y+"-"+String(m+1).padStart(2,"0");                 // "2026-06"
const mkOf=(d)=> mk(d.getFullYear(), d.getMonth());
function lastWorkingDay(y,m){                                        // último lun-vie del mes
  const d=new Date(y, m+1, 0);                                      // último día del mes
  while(d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()-1);  // retrocede si cae finde
  return d;
}
function nominaYaEntro(now){                                        // ¿ya pasó el último día laborable?
  now=now||new Date();
  return now.getDate() >= lastWorkingDay(now.getFullYear(), now.getMonth()).getDate();
}
// Al cargar: arrastra meses ya cerrados al saldo base (les mete su inyección y les resta su gasto)
/* ---- ROLES DE CUENTA: qué papel juega cada cuenta en el motor ----
   "fijos"  → lleva recibos/cuotas/nómina (comportamiento banco de siempre).
   "diario" → de aquí sale el gasto variable del día a día (el spendFrom de siempre, TR).
   "ambos"  → UNA cuenta para todo (gente que usa un solo banco): recibos Y gasto diario.
   `spendFrom` se mantiene sincronizado con el rol (diario/ambos → true) para que todo el
   motor existente siga funcionando sin tocar cada find(a=>a.spendFrom). Solo puede haber
   UNA cuenta diario/ambos a la vez (la UI degrada las demás a fijos). */
function accRole(a){ return (a&&a.role) || (a&&a.spendFrom ? "diario" : "fijos"); }
function accDaily(a){ const r=accRole(a); return r==="diario"||r==="ambos"; }   // gasto variable sale de aquí
function accFixed(a){ const r=accRole(a); return r==="fijos"||r==="ambos"; }    // participa en el motor de fijos
// Inyección de nómina de la cuenta de gasto (€ que entran cada mes FUERA del sistema de flujos).
// Antes era CONFIG.TR_INJECTION hardcodeado para todos; ahora es por cuenta (a.inject). Fallback
// anclado al id de la cuenta TR del creador (patrón de migración por id) hasta que la semilla escriba el campo.
function accInject(a){ if(!a) return 0; return a.inject!=null ? a.inject : (a.id==="ebj0vbh" ? CONFIG.TR_INJECTION : 0); }

function reconcileTR(s){
  if(!s.accounts || !s.expenses) return s;
  const acc=s.accounts.find(a=>a.spendFrom);
  if(!acc) return s;
  const now=new Date();
  const cmKey=mkOf(now);
  let anchor=s.trAnchor || cmKey;
  let [ay,am]=anchor.split("-").map(Number); am=am-1;
  let guard=0;
  while(mk(ay,am) < cmKey && guard<120){
    const key=mk(ay,am);
    const monthExp=s.expenses.filter(e=> mkOf(parseDate(e.date))===key);
    const spent=monthExp.reduce((a,e)=>a+e.amount,0);
    acc.value = acc.value + accInject(acc) - spent;                 // mes cerrado: + inyección de nómina − gasto
    // rol "ambos" (una cuenta para todo): además arrastra su neto de fijos/nómina/puntuales del mes
    if(accRole(acc)==="ambos") acc.value = +(acc.value + monthNetForAccount(s, acc.ent, ay, am+1, null)).toFixed(2);
    // Round-up & Saveback (#19): al cerrar el mes, el round-up sale del efectivo y se abona
    // (junto al saveback, dinero gratis) a la inversión destino comprando participaciones.
    const ru = (acc.roundupManual!=null) ? acc.roundupManual : roundupOf(monthExp, acc.roundup||0);
    const sb = (acc.savebackManual!=null) ? acc.savebackManual : (acc.saveback ? savebackOf(monthExp) : 0);
    if(ru>0) acc.value = +(acc.value - ru).toFixed(2);             // el round-up abandona el efectivo
    const contrib = ru + sb;                                       // total que entra a la inversión (€)
    if(contrib>0 && acc.rewardInv){
      const inv = s.investments && s.investments.find(function(i){ return i.id===acc.rewardInv; });
      if(inv){
        const cInv = inv.cur==="USD" ? contrib/(s.fx||1) : contrib;   // a la moneda de la inversión
        if(inv.shares>0 && inv.value>0) inv.shares = +(inv.shares + cInv/(inv.value/inv.shares)).toFixed(6);
        inv.value = +((inv.value||0)+cInv).toFixed(2);
        inv.cost  = +((inv.cost||0)+cInv).toFixed(2);
      }
      s.trRewardsTotal = +(((s.trRewardsTotal||0)+contrib)).toFixed(2);   // acumulado histórico (€)
    }
    // Aporte periódico a inversión (plan de ahorro, p.ej. 50€/mes al FTSE): sale del efectivo y
    // compra participaciones en su destino (por defecto el mismo del round-up).
    const mi = acc.monthlyInvest||0;
    if(mi>0){
      const dest = acc.monthlyInvestTo || acc.rewardInv;
      const inv2 = s.investments && s.investments.find(function(i){ return i.id===dest; });
      if(inv2){
        acc.value = +(acc.value - mi).toFixed(2);
        const cInv2 = inv2.cur==="USD" ? mi/(s.fx||1) : mi;
        if(inv2.shares>0 && inv2.value>0) inv2.shares = +(inv2.shares + cInv2/(inv2.value/inv2.shares)).toFixed(6);
        inv2.value = +((inv2.value||0)+cInv2).toFixed(2);
        inv2.cost  = +((inv2.cost||0)+cInv2).toFixed(2);
      }
    }
    // Interés del efectivo (TR lo abona el día 1 del mes siguiente = justo al cerrar):
    // estimación % anual / 12 sobre el saldo de cierre. Sin esto el saldo derivaba unos €/mes.
    if(acc.interestApr>0) acc.value = +(acc.value + acc.value*acc.interestApr/1200).toFixed(2);
    // los importes manuales de round-up/saveback eran de ESTE mes que se cierra → ya aplicados, se limpian
    if(acc.roundupManual!=null) delete acc.roundupManual;
    if(acc.savebackManual!=null) delete acc.savebackManual;
    // Demás bancos (Sabadell, etc.): arrastran su neto del mes cerrado (ingresos − fijos − cuotas − puntuales − transfers)
    s.accounts.forEach(function(a2){ if(!a2.spendFrom){ a2.value = +(((a2.value||0) + monthNetForAccount(s, a2.ent, ay, am+1, null))).toFixed(2); } });
    am++; if(am>11){am=0;ay++;}
    guard++;
  }
  s.trAnchor=cmKey;
  return s;
}

const uid=()=> Math.random().toString(36).slice(2,10);
const FREQ_M = { mes:1, mensual:1, bimestral:1/2, trimestral:1/3, semestral:1/6, "año":1/12, anual:1/12, semana:4.345 };

/* ---- Round-up & Saveback de TR (#19): calderilla y cashback que TR mueve a inversión ---- */
// Calderilla de una compra: TR redondea al € superior (2,00→3,00=1€; 5,95→6,00=0,05).
function spareOf(amt){ amt=Math.abs(amt||0); return +(Math.floor(amt)+1-amt).toFixed(2); }
// Round-up/saveback SOLO cuentan compras con tarjeta: gasto real (amount>0) que no esté
// marcado noCard (bizum/transferencia a personas, que TR no redondea ni bonifica).
function isCardSpend(e){ return e && e.amount>0 && !e.noCard; }
// Round-up total de una lista de gastos × multiplicador.
function roundupOf(expenses, mult){ if(!mult||mult<=0) return 0; let s=0; (expenses||[]).forEach(function(e){ if(isCardSpend(e)) s+=spareOf(e.amount); }); return +(s*mult).toFixed(2); }
// Saveback: 1% del gasto con tarjeta del periodo, tope 15€/mes (dinero gratis de TR).
function savebackOf(expenses){ let g=0; (expenses||[]).forEach(function(e){ if(isCardSpend(e)) g+=e.amount; }); return +Math.min(15, g*0.01).toFixed(2); }
const RU_MULTS=[0,2,3,5,10];

/* ---- Metas de ahorro (#15): helpers de progreso/previsión + celebración ---- */
const GOAL_EMOJIS=["🎯","✈️","🏠","🚗","💍","🎓","🛟","🎮","💻","🏖️","🎁","💰","📱","🐱"];
function goalPct(g){ const tg=(g&&g.target)||0; return tg>0 ? Math.min(100, Math.max(0,((g.saved||0)/tg)*100)) : 0; }
function goalRemaining(g){ return Math.max(0, ((g&&g.target)||0)-((g&&g.saved)||0)); }
// meses enteros desde hoy hasta una fecha "YYYY-MM" (negativo = ya pasada); null si no hay fecha
function monthsUntil(ym){ if(!ym) return null; const p=String(ym).split("-"); const d=new Date(); return (+p[0]-d.getFullYear())*12 + ((+p[1]-1)-d.getMonth()); }
// etiqueta "mes año" sumando n meses al mes actual
function monthYearIn(n){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+(n||0)); return monthShort(d.getMonth())+" "+d.getFullYear(); }
// frase viva de previsión a partir del ahorro mensual real → {text, cls:""|"ok"|"warn"}
function goalEta(g, monthlySaving){
  const rem=goalRemaining(g);
  if((g&&g.done) || rem<=0) return {text:t("gl_eta_reached"), cls:"ok"};
  // aporte mensual elegido PARA esta meta tiene prioridad sobre el ahorro global
  const m = (g && g.monthly>0) ? g.monthly : monthlySaving;
  const dl=monthsUntil(g.deadline);
  if(dl!=null){
    if(dl<=0) return {text:t("gl_eta_overdue"), cls:"warn"};
    const need=rem/dl;
    if(m>0 && m>=need) return {text:tf("gl_eta_ok",{x:eur0(rem),m:dl}), cls:"ok"};
    return {text:tf("gl_eta_behind",{x:eur0(need)}), cls:"warn"};
  }
  if(m>0){ const months=Math.max(1,Math.ceil(rem/m)); return {text:tf("gl_eta",{x:eur0(m),when:monthYearIn(months)}), cls:""}; }
  return {text:t("gl_eta_nosaving"), cls:""};
}

// Rediseño · toque 2: convierte un entero a palabras en español (hasta millones), para "ver/oír"
// el patrimonio al mantener pulsada la cifra. Apócopes: "un"/"veintiún", "cien"/"ciento".
function words(num){
  num=Math.round(Math.abs(num));
  if(num===0) return "cero";
  const U=["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve","diez","once","doce","trece","catorce","quince","dieciséis","diecisiete","dieciocho","diecinueve","veinte","veintiuno","veintidós","veintitrés","veinticuatro","veinticinco","veintiséis","veintisiete","veintiocho","veintinueve"];
  const D=["","","","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
  const C=["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];
  const tens=function(n){ return n<30?U[n]:D[Math.floor(n/10)]+(n%10?" y "+U[n%10]:""); };
  const hund=function(n){ return n===100?"cien":(Math.floor(n/100)?C[Math.floor(n/100)]:"")+(Math.floor(n/100)&&n%100?" ":"")+(n%100?tens(n%100):""); };
  const apo=function(s){ return s.replace(/uno$/,"un").replace(/veintiuno$/,"veintiún"); };
  const mill=Math.floor(num/1000000), miles=Math.floor((num%1000000)/1000), resto=num%1000;
  let out="";
  if(mill) out+=(mill===1?"un millón":apo(hund(mill))+" millones");
  if(miles) out+=(out?" ":"")+(miles===1?"mil":apo(hund(miles))+" mil");
  if(resto) out+=(out?" ":"")+hund(resto);
  return out.trim();
}
// Rediseño · toque 4: mezcla dos hex (mint↔coral) en JS → "r,g,b". Evita depender de color-mix
// del WebView; con t=0 devuelve exactamente el mint del hero actual (0 cambios visibles).
function mixHex(a,b,t){
  const h=function(s,i){ return parseInt(s.slice(i,i+2),16); };
  const r=Math.round(h(a,1)+(h(b,1)-h(a,1))*t), g=Math.round(h(a,3)+(h(b,3)-h(a,3))*t), bl=Math.round(h(a,5)+(h(b,5)-h(a,5))*t);
  return r+","+g+","+bl;
}

/* ============================================================
   GAMIFICACIÓN (#15 capas Retos + Logros) — TODO DERIVADO de los datos,
   sin marcar nada a mano. savedScore = ahorrado en metas + recompensas TR acumuladas.
   ============================================================ */
const RU_GOAL=30;                       // €/mes objetivo de round-up+saveback (reto)
const SAVE_HITOS=[100,500,1000,5000];   // hitos de ahorro (medallas)
const GM_LEVELS=[0,250,1000,3000,8000]; // umbrales de savedScore por nivel
const GM_ICONS=["🐣","🐢","🦊","🦅","👑"];
// Gasto mensual (solo gastos reales, amount>0) por clave YYYY-MM.
function spendByMonth(expenses){ const m={}; (expenses||[]).forEach(function(e){ if(e.amount>0){ const k=mkOf(parseDate(e.date)); m[k]=(m[k]||0)+e.amount; } }); return m; }
function median(arr){ const a=(arr||[]).slice().sort(function(x,y){return x-y;}); const n=a.length; if(!n) return 0; return n%2?a[(n-1)/2]:(a[n/2-1]+a[n/2])/2; }
// Detector de SUSCRIPCIONES / cargos recurrentes: mismo comercio en ≥3 meses distintos con importe
// estable (≥60% dentro de ±25% de la mediana). Devuelve {name,cat,amount,months,last,active,yearly}.
function detectSubscriptions(expenses){
  const now=new Date();
  const activeCut=mk(now.getFullYear(), now.getMonth()-2);   // visto en los últimos ~2 meses = sigue activa
  const groups={};
  (expenses||[]).forEach(function(e){
    if(!(e.amount>0)) return; const k=catKey(e.merchant); if(!k) return;
    const mkey=mkOf(parseDate(e.date));
    const g=(groups[k]=groups[k]||{name:e.merchant||k,cat:e.category,byMonth:{}});
    g.byMonth[mkey]=(g.byMonth[mkey]||0)+e.amount; g.name=e.merchant||g.name; g.cat=e.category;
  });
  const subs=[];
  Object.keys(groups).forEach(function(k){
    const g=groups[k]; const months=Object.keys(g.byMonth).sort(); if(months.length<3) return;
    const amts=months.map(function(m){ return g.byMonth[m]; });
    const med=median(amts); if(med<=0) return;
    const consistent=amts.filter(function(a){ return Math.abs(a-med)<=Math.max(1,med*0.25); }).length;
    if(consistent < Math.ceil(months.length*0.6)) return;
    const last=months[months.length-1];
    subs.push({ key:k, name:g.name, cat:g.cat, amount:+med.toFixed(2), months:months.length, last:last, active:last>=activeCut, yearly:Math.round(med*12) });
  });
  return subs.sort(function(a,b){ return b.amount-a.amount; });
}
// Racha de meses CERRADOS consecutivos bajo presupuesto + mejor racha histórica.
function underBudgetStreak(expenses, budget){
  if(!budget||budget<=0) return {current:0,best:0,ever:false};
  const sb=spendByMonth(expenses);
  const now=new Date(); const curKey=mk(now.getFullYear(),now.getMonth());
  const keys=Object.keys(sb).filter(function(k){ return k<curKey; }).sort();   // meses cerrados, ascendente
  let best=0,run=0,ever=false;
  keys.forEach(function(k){ if(sb[k]<=budget){ run++; if(run>best)best=run; ever=true; } else run=0; });
  let cur=0; for(let i=keys.length-1;i>=0;i--){ if(sb[keys[i]]<=budget) cur++; else break; }
  return {current:cur,best:best,ever:ever};
}
// Estado completo de gamificación (puro, sin efectos).
function gamifOf(state, totals){
  const tt=totals||{};
  const goals=state.goals||[];
  const savedScore=goals.reduce(function(a,g){return a+(g.saved||0);},0) + (tt.trRewardsTotal||state.trRewardsTotal||0);
  let lvl=0; for(let i=0;i<GM_LEVELS.length;i++){ if(savedScore>=GM_LEVELS[i]) lvl=i; }
  const nextMin = (lvl+1<GM_LEVELS.length) ? GM_LEVELS[lvl+1] : null;
  const base=GM_LEVELS[lvl];
  const lvlProg = nextMin!=null ? Math.min(100,Math.max(0,(savedScore-base)/(nextMin-base)*100)) : 100;
  const budget=state.budget||0, spent=tt.thisMonthSpent||0;
  const ruCur=+(((tt.roundupThisMonth||0)+(tt.savebackThisMonth||0))).toFixed(2);
  const budgetReto={ id:"budget", spent:spent, budget:budget, margin:+(budget-spent).toFixed(2), done:budget>0&&spent<=budget, pct: budget>0?Math.min(100,spent/budget*100):0 };
  const ruReto={ id:"roundup", cur:ruCur, goal:RU_GOAL, done:ruCur>=RU_GOAL, pct:Math.min(100,ruCur/RU_GOAL*100) };
  const streak=underBudgetStreak(state.expenses, budget);
  const anyGoalDone=goals.some(function(g){return g.done;});
  const badges=[
    {id:"first_goal", unlocked:anyGoalDone},
    {id:"first_underbudget", unlocked:streak.ever},
    {id:"first_reto", unlocked:ruReto.done||streak.ever},
    {id:"streak_3", unlocked:streak.best>=3},
    {id:"save_100", unlocked:savedScore>=100},
    {id:"save_500", unlocked:savedScore>=500},
    {id:"save_1000", unlocked:savedScore>=1000},
    {id:"save_5000", unlocked:savedScore>=5000}
  ];
  return {savedScore:savedScore, lvl:lvl, nextMin:nextMin, lvlProg:lvlProg, retos:[budgetReto,ruReto], budgetReto:budgetReto, ruReto:ruReto, streak:streak, badges:badges};
}

function migrate(s){
  // corrige el importe ORIGINAL de las deudas (referencia fija) aunque ya hubiera datos guardados
  if(s.debts){
    s.debts = s.debts.map(function(d){
      const seed = DATA.debts.find(function(x){ return x.id===d.id; });
      if(seed) return Object.assign({}, d, { original: seed.original, note: seed.note });
      return d;
    });
  }
  // inversiones: si no tienen "cost", lo derivamos del % antiguo (cost = value/(1+pl/100))
  if(s.investments){
    s.investments = s.investments.map(function(i){
      if(i.cost!=null) return i;
      const seed = DATA.investments.find(function(x){ return x.id===i.id; });
      let cost = seed ? seed.cost : (i.pl!=null ? i.value/(1+i.pl/100) : i.value);
      const o = Object.assign({}, i, { cost: cost }); delete o.pl; return o;
    });
  }
  // aseguramos array de gastos fijos
  if(!s.fixed) s.fixed = DATA.fixed.map(function(a){ return Object.assign({},a); });
  // v4: refrescar valor+coste de inversiones con los últimos datos (por id)
  if(s.investments && (!s._dataVer || s._dataVer<4)){
    s.investments = s.investments.map(function(i){
      const seed = DATA.investments.find(function(x){ return x.id===i.id; });
      return seed ? Object.assign({}, i, { value:seed.value, cost:seed.cost, cur:seed.cur }) : i;
    });
  }
  s._dataVer = 4;
  // v5: tickers/shares para auto-precio, marca de cuenta de gasto y settings
  if(s.investments && s._dataVer<5){
    s.investments = s.investments.map(function(i){
      const seed = DATA.investments.find(function(x){ return x.id===i.id; });
      return seed ? Object.assign({}, i, { ticker:seed.ticker, shares:seed.shares }) : i;
    });
  }
  if(s.accounts){
    s.accounts = s.accounts.map(function(a){
      const seed = DATA.accounts.find(function(x){ return x.id===a.id; });
      return seed ? Object.assign({}, a, { spendFrom:seed.spendFrom, note:seed.note }) : a;
    });
  }
  if(!s.settings) s.settings={ autoPrices:false };
  s._dataVer = 5;
  // v6: ancla de mes para el efectivo de TR (la inyección mensual y el arrastre se calculan desde aquí)
  if(s._dataVer<6){
    if(!s.trAnchor) s.trAnchor = mkOf(new Date());
  }
  s._dataVer = 6;
  store.set("micartera_v3", s);
  return s;
}

/* ---- Cierre de overlays con el gesto/botón "atrás" del móvil (History API) ----
   Sin esto, el gesto de retroceso hace history.back() y, al no haber una entrada
   propia, SALE de la PWA. Metemos una entrada de historial por cada overlay abierto
   y, al retroceder, cerramos SOLO el de arriba (pila LIFO), no todos a la vez. */
var _mcBackStack=[];        // overlays abiertos, en orden de apertura
var _mcIgnorePop=false;     // true mientras consumimos nuestra propia entrada (cierre por UI)
var _mcBackInit=false;
function _mcBackInitOnce(){
  if(_mcBackInit) return; _mcBackInit=true;
  window.addEventListener("popstate", function(){
    if(_mcIgnorePop){ _mcIgnorePop=false; return; }   // fue nuestro history.back() de cierre por UI
    var top=_mcBackStack.pop();
    if(top){ top._byPop=true; top.close(); }           // cierra el overlay superior
  });
}
function useBackClose(open, onClose){
  const entry=useRef(null);
  useEffect(function(){
    _mcBackInitOnce();
    if(!open) return undefined;
    const e={ close:onClose, _byPop:false };
    entry.current=e;
    _mcBackStack.push(e);
    try{ history.pushState({mcOverlay:true}, ""); }catch(err){}
    return function(){
      const i=_mcBackStack.indexOf(e);
      if(i>=0) _mcBackStack.splice(i,1);
      if(!e._byPop){                                    // cerrado por UI (botón/swipe), no por gesto atrás:
        _mcIgnorePop=true;                              // consumimos nuestra entrada sin cerrar otro overlay
        try{ history.back(); }catch(err){ _mcIgnorePop=false; }
      }
    };
  },[open]);
}

function useEditable(items, onChange, opts){

  const toStored = opts.toStored || ((i,typed)=>typed);            // cómo se guarda lo tecleado
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState({});
  const start=()=>{ const d={}; items.forEach(i=>d[i.id]=disp(i)); setDraft(d); setEditing(true); };
  const save=()=>{ onChange(items.map(i=>{ const typed=parseFloat(String(draft[i.id]).replace(',','.'))||0; const extra=opts.extra?opts.extra(i,typed):null; return Object.assign({},i,{value: toStored(i,typed) }, extra||{}); })); setEditing(false); };

function inPreset(d,preset,range){

  if(preset==="month") return d>=startOfMonth();
  if(preset==="last"){ const s=startOfMonth(new Date(now.getFullYear(),now.getMonth()-1,1)); const e=startOfMonth(); return d>=s&&d<e; }
  if(preset==="3m"){ return d>=new Date(now.getFullYear(),now.getMonth()-2,1); }
  if(preset==="all") return true;
  if(preset==="custom"){ let ok=true; if(range.from) ok=ok&&d>=new Date(range.from); if(range.to){ const tt=new Date(range.to); tt.setHours(23,59,59); ok=ok&&d<=tt; } return ok; }

    if(cloud.enabled()) cloud.deleteExpense(e).catch(function(){});

  };

// sugerencia de mapeo ISIN→posición (la usa la sincro TR): primero por ISIN guardado, luego por palabras del nombre
function brokerSuggest(pos, investments){
  const byIsin=investments.find(function(i){ return i.isin && i.isin===pos.isin; });
  if(byIsin) return byIsin.id;
  const words=String(pos.name||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").split(/[^a-z0-9&]+/).filter(function(w){ return w.length>=4; });
  let best=null, bestScore=0;
  investments.forEach(function(i){
    const nm=String(i.name||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
    const score=words.reduce(function(a,w){ return a+(nm.indexOf(w)>=0?1:0); },0);
    if(score>bestScore){ bestScore=score; best=i.id; }
  });
  return best;
}

/* ============================================================
   SINCRONIZACIÓN TRADE REPUBLIC (beta) — un botón, sin exportar nada.
   La conexión REAL la implementa la capa NATIVA de Android (necesita un
   navegador de verdad para el token de AWS WAF del login de TR; una función
   de servidor "pelada" recibe 403). En la web pura el puente no existe y la
   tarjeta muestra el aviso "solo en la app". El re-anclaje reutiliza el
   mapeo por ISIN del importador CSV (brokerSuggest).

   CONTRATO que la capa nativa DEBE cumplir (todo devuelve Promises):
     trBridge().status()                 -> { connected:bool }
     trBridge().login({phone,pin})       -> { ok:bool, processId?, error? }   (dispara el 2FA)
     trBridge().verify({processId,code}) -> { ok:bool, error? }               (guarda la sesión EN EL DISPOSITIVO)
     trBridge().sync()                   -> { ok:bool, positions:[{isin,name,shares,value,cost?}], cash?:number, error? }
     trBridge().logout()                 -> { ok:bool }
   `value`/`cost` en EUR (TR liquida en €). NADA de esto toca la nube de Mi Cartera:
   credenciales y sesión viven solo en el móvil.
   ============================================================ */
function trBridge(){
  try{
    if(typeof window==="undefined") return null;
    const cap=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.TradeRepublic;
    if(cap) return cap;
    if(window.MiCarteraTR) return window.MiCarteraTR;
  }catch(e){}
  return null;
}

name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

# Permisos mínimos para publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no canceles el que esté en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sellar versión del Service Worker
        run: node scripts/stamp-version.mjs

      # Minifica los <script>/<style> inline de public/index.html (solo whitespace+syntax,
      # sin renombrar símbolos). La fuente editable sigue siendo el index.html del repo.
      - name: Minificar index.html
        run: |
          npm install --no-save --no-audit --no-fund esbuild@0.25.5
          node scripts/minify-html.mjs

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (carpeta public)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

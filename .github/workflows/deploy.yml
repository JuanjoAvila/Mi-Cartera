name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

# Permisos mínimos para publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no canceles el que esté en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Tests + privacidad
        run: npm ci && npx playwright install chromium --with-deps && node scripts/run-tests.mjs && node scripts/guard-privacy.mjs

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensamblar index.html desde src/
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: node scripts/build-app.mjs

      - name: Sellar versión del Service Worker
        run: node scripts/stamp-version.mjs

      # Minifica los <script>/<style> inline de public/index.html (solo whitespace+syntax,
      # sin renombrar símbolos). La fuente editable sigue siendo el index.html del repo.
      - name: Minificar index.html
        run: |
          npm install --no-save --no-audit --no-fund esbuild@0.25.5
          node scripts/minify-html.mjs

      # Bundle OTA para la app Android (capgo/capacitor-updater self-hosted):
      # zip de public/ (ya sellado+minificado) + version.json con la versión.
      # La app lo consulta al arrancar y hot-swapea el bundle en el siguiente arranque.
      - name: Empaquetar bundle OTA (bundle.zip + version.json)
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          (cd public && zip -qr ../bundle.zip .)
          mv bundle.zip public/bundle.zip
          printf '{"version":"%s","url":"https://juanjoavila.github.io/Mi-Cartera/bundle.zip"}\n' "$VERSION" > public/version.json
          echo "OTA $VERSION → $(du -h public/bundle.zip | cut -f1)"

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (carpeta public)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Tests (build + unit + Deno + E2E)
        run: node scripts/run-tests.mjs

      - name: Privacidad
        run: node scripts/guard-privacy.mjs

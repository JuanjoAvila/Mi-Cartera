name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Privacidad (no datos reales en index.html)
        run: node scripts/guard-privacy.mjs

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Ejecutar tests (sintaxis + lógica crítica + ingest Deno)
        run: node scripts/run-tests.mjs

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\", iconBg: \"rgba(127,181,232,.12)\", name: \"Repsol\", meta: \"Transporte · Trade Republic\", amt: \"58,30 €\", neg: false },\n      { day: \"Ayer\", icon: \"💰\", iconBg: \"rgba(95,208,138,.12)\", name: \"Bizum de Ana\", meta: \"Ingreso\", amt: \"+25,00 €\", neg: true },\n      { day: \"Lunes 14\", icon: \"🛒\", iconBg: \"rgba(95,208,138,.12)\", name: \"Mercadona\", meta: \"Supermercado · Trade Republic\", amt: \"31,80 €\", neg: false },\n      { day: \"Lunes 14\", icon: \"🎬\", iconBg: \"rgba(155,208,224,.12)\", name: \"Cine Yelmo\", meta: \"Ocio · Trade Republic\", amt: \"18,00 €\", neg: false },\n      { day: \"Sábado 12\", icon: \"🛍️\", iconBg: \"rgba(201,160,224,.12)\", name: \"Zara\", meta: \"Compras · CaixaBank\", amt: \"13,26 €\", neg: false },\n      { day: \"Sábado 12\", icon: \"🍽️\", iconBg: \"rgba(230,195,106,.12)\", name: \"La Tasca\", meta: \"Bares · Trade Republic\", amt: \"42,10 €\", neg: false },\n      { day: \"Jueves 10\", icon: \"💊\", iconBg: \"rgba(111,214,201,.12)\", name: \"Farmacia Central\", meta: \"Salud · a mano\", amt: \"8,75 €\", neg: false }\n    ]\n  };\n  applyTheme(){\n    const th = this.props.theme || \"verde\";\n    const map = { verde: \"\", oscuro: \"dark\", claro: \"light\" };\n    const v = map[th] != null ? map[th] : \"\";\n    if(!v) document.documentElement.removeAttribute(\"data-theme\");\n    else document.documentElement.setAttribute(\"data-theme\", v);\n    document.documentElement.style.fontSize = this.props.letraGrande ? \"18px\" : \"\";\n  }\n  componentDidMount(){\n    this.applyTheme();\n    // count-up del hero (respeta reduced-motion)\n    const target = 30215.02, reduce = window.matchMedia && window.matchMedia(\"(prefers-reduced-motion:reduce)\").matches;\n    if(reduce){ this.setState({ shown: target }); return; }\n    const t0 = performance.now(), dur = 950, ease = (x) => 1 - Math.pow(1 - x, 3);\n    const step = (now) => {\n      const p = Math.min(1, (now - t0) / dur);\n      this.setState({ shown: target * ease(p) });\n      if(p < 1) this._raf = requestAnimationFrame(step);\n    };\n    this._raf = requestAnimationFrame(step);\n  }\n  componentWillUnmount(){ cancelAnimationFrame(this._raf); }\n  componentDidUpdate(){ this.applyTheme(); }\n  fmt(n){ return n.toLocaleString(\"es-ES\", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }\n  showToast(m){\n    clearTimeout(this._tt);\n    this.setState({ toast: m });\n    this._tt = setTimeout(() => this.setState({ toast: null }), 2200);\n  }\n  renderVals(){\n    const s = this.state, P = this.props;\n    const sencillo = !!P.modoSencillo;\n    const shown = s.shown != null ? s.shown : 30215.02;\n    const parts = this.fmt(shown).split(\",\");\n    const go = (i) => () => this.setState({ tab: i });\n    const CATN = [\"Súper\", \"Bares\", \"Transporte\", \"Ocio\", \"Otros\"];\n    const CATI = [\"🛒\", \"🍽️\", \"🚇\", \"🎬\", \"📦\"];\n    const CATBG = [\"rgba(95,208,138,.12)\", \"rgba(230,195,106,.12)\", \"rgba(127,181,232,.12)\", \"rgba(155,208,224,.12)\", \"rgba(143,168,154,.12)\"];\n    // filas de gastos con separadores de día\n    const rows = []; let last = null;\n    s.expenses.forEach((e, i) => {\n      if(e.day !== last){ rows.push({ isSep: true, isRow: false, label: e.day, key: \"s\" + i }); last = e.day; }\n      rows.push(Object.assign({ isSep: false, isRow: true, key: \"e\" + i, amtColor: e.neg ? \"var(--mint)\" : \"var(--text)\" }, e));\n    });\n    const amtStr = s.amt === \"\" ? \"0\" : s.amt;\n    const vals = {\n      heroLabel: sencillo ? \"Tu dinero en total\" : \"Patrimonio neto\",\n      expTitle: sencillo ? \"Lo que gastas\" : \"Tus gastos\",\n      heroInt: parts[0], heroDec: parts[1] || \"00\",\n      goHome: go(0), goExpenses: go(1), goPlan: () => this.setState({ tab: 2, planSeg: 0 }),\n      goPlanMetas: () => this.setState({ tab: 2, planSeg: 2 }),\n      goWealth: go(3), goSettings: go(4),\n      isHome: s.tab === 0, isExpenses: s.tab === 1, isPlan: s.tab === 2, isWealth: s.tab === 3, isSettings: s.tab === 4,\n      navX: \"translateX(\" + [0, 100, 300, 400, 0][s.tab] + \"%)\",\n      navOp: s.tab === 4 ? \"0\" : \"1\",\n      nav0c: s.tab === 0 ? \"var(--mint)\" : \"var(--muted2)\",\n      nav1c: s.tab === 1 ? \"var(--mint)\" : \"var(--muted2)\",\n      nav3c: s.tab === 2 ? \"var(--mint)\" : \"var(--muted2)\",\n      nav4c: s.tab === 3 ? \"var(--mint)\" : \"var(--muted2)\",\n      // plan segmented\n      planRecibos: s.planSeg === 0, planDeudas: s.planSeg === 1, planMetas: s.planSeg === 2,\n      segRecibos: () => this.setState({ planSeg: 0 }), segDeudas: () => this.setState({ planSeg: 1 }), segMetas: () => this.setState({ planSeg: 2 }),\n      seg0bg: s.planSeg === 0 ? \"var(--mint)\" : \"transparent\", seg0c: s.planSeg === 0 ? \"var(--on-mint)\" : \"var(--muted)\",\n      seg1bg: s.planSeg === 1 ? \"var(--mint)\" : \"transparent\", seg1c: s.planSeg === 1 ? \"var(--on-mint)\" : \"var(--muted)\",\n      seg2bg: s.planSeg === 2 ? \"var(--mint)\" : \"transparent\", seg2c: s.planSeg === 2 ? \"var(--on-mint)\" : \"var(--muted)\",\n      // gastos\n      rows: rows, spentTotal: \"358,90 €\",\n      // sheet apuntar\n      addOpen: s.addOpen,\n      openAdd: () => this.setState({ addOpen: true, amt: \"\", income: false, cat: 0 }),\n      closeAdd: () => this.setState({ addOpen: false }),\n      setGasto: () => this.setState({ income: false }), setIngreso: () => this.setState({ income: true }),\n      kGastoBg: !s.income ? \"var(--mint)\" : \"var(--sur)\", kGastoC: !s.income ? \"var(--on-mint)\" : \"var(--muted)\",\n      kIngBg: s.income ? \"var(--mint)\" : \"var(--sur)\", kIngC: s.income ? \"var(--on-mint)\" : \"var(--muted)\",\n      kAmt: amtStr, kAmtColor: s.amt === \"\" ? \"var(--muted2)\" : \"var(--text)\",\n      kCta: s.income ? \"Guardar ingreso\" : \"Guardar gasto\",\n      kDel: () => this.setState({ amt: s.amt.slice(0, -1) }),\n      kC: () => { if(s.amt !== \"\" && s.amt.indexOf(\",\") < 0) this.setState({ amt: s.amt + \",\" }); },\n      saveExp: () => {\n        if(s.amt === \"\"){ this.showToast(\"Pon un importe 🙂\"); return; }\n        const disp = (s.income ? \"+\" : \"\") + s.amt + (s.amt.indexOf(\",\") < 0 ? \",00\" : \"\") + \" €\";\n        const e = { day: \"Hoy\", icon: s.income ? \"💰\" : CATI[s.cat], iconBg: CATBG[s.cat], name: s.income ? \"Ingreso\" : CATN[s.cat], meta: (s.income ? \"Ingreso\" : CATN[s.cat]) + \" · a mano\", amt: disp, neg: s.income };\n        this.setState({ expenses: [e].concat(s.expenses), addOpen: false, tab: 1 });\n        this.showToast(s.income ? \"✓ Ingreso apuntado\" : \"✓ Gasto apuntado\");\n      },\n      toastOn: !!s.toast, toastMsg: s.toast || \"\",\n      // onboarding\n      obOn: (P.pantalla === \"onboarding\") && !s.obDone,\n      ob0: s.obStep === 0, ob1: s.obStep === 1, ob2: s.obStep === 2,\n      obCta: s.obStep === 2 ? \"Empezar con \" + s.obBudget + \" €/mes\" : \"Continuar\",\n      obNext: () => { if(s.obStep < 2) this.setState({ obStep: s.obStep + 1 }); else { this.setState({ obDone: true }); this.showToast(\"👋 ¡Bienvenido, Juanjo!\"); } },\n      obSkip: () => this.setState({ obDone: true }),\n      obBudget: String(s.obBudget),\n      obBudUp: () => this.setState({ obBudget: s.obBudget + 50 }),\n      obBudDown: () => this.setState({ obBudget: Math.max(100, s.obBudget - 50) })\n    };\n    for(let d = 0; d <= 9; d++) vals[\"k\" + d] = (() => { const dd = String(d); return () => { if(this.state.amt.length < 7) this.setState({ amt: this.state.amt === \"0\" ? dd : this.state.amt + dd }); }; })();\n    for(let c = 0; c < 5; c++){\n      vals[\"selC\" + c] = (() => { const cc = c; return () => this.setState({ cat: cc }); })();\n      vals[\"c\" + c + \"bg\"] = s.cat === c ? \"rgba(95,208,138,.16)\" : \"var(--sur)\";\n      vals[\"c\" + c + \"c\"] = s.cat === c ? \"var(--mint)\" : \"var(--muted)\";\n      vals[\"c\" + c + \"bd\"] = s.cat === c ? \"var(--mint-deep)\" : \"var(--line-soft)\";\n    }\n    [\"obD0\", \"obD1\", \"obD2\"].forEach((k, i) => {\n      vals[k + \"w\"] = s.obStep === i ? \"22px\" : \"8px\";\n      vals[k + \"c\"] = s.obStep === i ? \"var(--mint)\" : \"var(--line)\";\n    });\n    return vals;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
